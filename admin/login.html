<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - B-Press Admin</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
    <div class="login-card">
        <h1 class="login-title">B-Press 控制台</h1>
        <form id="login-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-block">登 录</button>
            <p id="error-msg" style="color: var(--admin-danger); margin-top: 15px; text-align: center;"></p>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Check if setup is needed
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');

            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            };
            const csrf = getCookie('csrf_token') || '';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-csrf-token': csrf 
                    },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = 'index.html';
                } else {
                    err.textContent = data.error || '登录失败';
                }
            } catch (e) {
                err.textContent = '网络错误';
            }
        });
    </script>
</body>
</html>
