<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>B-Press 控制台</title>
    <link rel="stylesheet" href="css/admin.css">
    <!-- EasyMDE for Markdown -->
    <link rel="stylesheet" href="/vendor/easymde/easymde.min.css">
    <script src="/vendor/easymde/easymde.min.js"></script>
    <!-- DOMPurify for XSS Protection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">B-Press Admin</div>
        <ul class="nav-menu">
            <li><a href="#dashboard" class="active">仪表盘</a></li>
            <li><a href="#posts">文章管理</a></li>
            <li><a href="#categories">分类目录</a></li>
            <li><a href="#comments">评论管理</a></li>
            <li><a href="#pages">独立页面</a></li>
            <li><a href="#files">文件管理</a></li>
            <li><a href="#themes">外观主题</a></li>
            <li><a href="#settings">系统设置</a></li>
            <li><a href="#" id="logout-btn" style="color: var(--admin-danger);">退出登录</a></li>
            <li style="margin-top: 15px; border-top: 1px solid var(--admin-border); padding-top: 15px;">
                <a href="/" target="_blank" style="color: var(--admin-primary); font-weight: bold; text-align: center;">查看前台主页</a>
            </li>
        </ul>
    </aside>

    <main class="main-content" id="app-root">
        <!-- SPA content rendered here by app.js -->
    </main>

    <!-- Global Modal Container -->
    <div id="global-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:var(--admin-bg); padding:25px; border-radius:8px; width:400px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
            <h3 id="modal-title" style="margin-top:0; margin-bottom:15px; color:var(--admin-text);">Title</h3>
            <div id="modal-body" style="margin-bottom:20px;"></div>
            <div style="text-align:right;">
                <button class="btn" style="background:var(--admin-border); color:var(--admin-text);" onclick="app.closeModal()">取消</button>
                <button class="btn" id="modal-confirm" style="margin-left:10px;">确定</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/theme-manager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
